name: hermes-home

x-agent-platform-image: &agent-platform-image
  image: hermes-agent-platform:${AGENT_PLATFORM_IMAGE_TAG:-formal}
  build:
    context: "${AGENT_PLATFORM_BUILD_CONTEXT:-../agent-platform}"
    dockerfile: Dockerfile
  restart: unless-stopped

x-tonglingyu-gateway-image: &tonglingyu-gateway-image
  image: tonglingyu-gateway:${TONGLINGYU_GATEWAY_IMAGE_TAG:-formal}
  build:
    context: "${TONGLINGYU_GATEWAY_BUILD_CONTEXT:-../agent-platform}"
    dockerfile: crates/tonglingyu-gateway/Dockerfile
  restart: unless-stopped

x-global-router-image: &global-router-image
  image: global-router:${GLOBAL_ROUTER_IMAGE_TAG:-formal}
  build:
    context: "${GLOBAL_ROUTER_BUILD_CONTEXT:-../agent-platform}"
    dockerfile: crates/global-router/Dockerfile
  restart: unless-stopped

services:
  hermes:
    image: nousresearch/hermes-agent:${HERMES_IMAGE_TAG:-latest}
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    environment:
      HERMES_DASHBOARD: "${HERMES_DASHBOARD:-0}"
      API_SERVER_ENABLED: "${HERMES_API_SERVER_ENABLED:-true}"
      API_SERVER_HOST: "${HERMES_API_SERVER_HOST:-0.0.0.0}"
      API_SERVER_PORT: "${HERMES_API_SERVER_PORT:-8642}"
      API_SERVER_KEY: "${HERMES_API_KEY:?set HERMES_API_KEY in .env}"
      API_SERVER_MODEL_NAME: "${HERMES_API_SERVER_MODEL_NAME:-hermes-agent}"
      API_SERVER_CORS_ORIGINS: "${HERMES_API_SERVER_CORS_ORIGINS:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
    volumes:
      - "${HERMES_DATA_DIR:?set HERMES_DATA_DIR in .env}:/opt/data"
    expose:
      - "8642"
      - "9119"
    networks:
      hermes-internal:
        ipv4_address: "${HERMES_AGENT_IP:-172.20.0.2}"
      local-openai-network: {}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8642/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPEN_WEBUI_IMAGE_TAG:-main}
    container_name: hermes-open-webui
    restart: unless-stopped
    depends_on:
      global-router:
        condition: service_healthy
    environment:
      WEBUI_NAME: "${OPEN_WEBUI_NAME:-Hermes Home}"
      WEBUI_URL: "${PUBLIC_WEBUI_URL:?set PUBLIC_WEBUI_URL in .env}"
      WEBUI_AUTH: "${OPEN_WEBUI_AUTH:-true}"
      ENABLE_LOGIN_FORM: "${OPEN_WEBUI_ENABLE_LOGIN_FORM:-true}"
      ENABLE_PASSWORD_AUTH: "${OPEN_WEBUI_ENABLE_PASSWORD_AUTH:-true}"
      ENABLE_SIGNUP: "${OPEN_WEBUI_ENABLE_SIGNUP:-true}"
      ENABLE_SIGNUP_PASSWORD_CONFIRMATION: "${OPEN_WEBUI_ENABLE_SIGNUP_PASSWORD_CONFIRMATION:-true}"
      DEFAULT_USER_ROLE: "${OPEN_WEBUI_DEFAULT_USER_ROLE:-pending}"
      DEFAULT_LOCALE: "${OPEN_WEBUI_DEFAULT_LOCALE:-zh-CN}"
      DEFAULT_MODELS: "${OPEN_WEBUI_DEFAULT_MODELS:-tonglingyu}"
      OFFLINE_MODE: "${OPEN_WEBUI_OFFLINE_MODE:-true}"
      HF_HUB_OFFLINE: "${OPEN_WEBUI_HF_HUB_OFFLINE:-1}"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_RAG_EMBEDDING_MODEL_AUTO_UPDATE:-false}"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_RAG_RERANKING_MODEL_AUTO_UPDATE:-false}"
      WHISPER_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_WHISPER_MODEL_AUTO_UPDATE:-false}"
      OPENAI_API_BASE_URL: "http://global-router:8099/v1"
      OPENAI_API_KEY: "${HERMES_API_KEY:?set HERMES_API_KEY in .env}"
      ENABLE_OLLAMA_API: "${OPEN_WEBUI_ENABLE_OLLAMA_API:-false}"
    volumes:
      - "${OPEN_WEBUI_DATA_DIR:?set OPEN_WEBUI_DATA_DIR in .env}:/app/backend/data"
    expose:
      - "8080"
    networks:
      hermes-internal:
        ipv4_address: "${OPEN_WEBUI_ORIGIN_IP:-172.20.0.3}"

  global-router:
    <<: *global-router-image
    container_name: global-router
    command:
      [
        "global-router",
        "serve",
        "--bind",
        "0.0.0.0:8099",
      ]
    depends_on:
      tonglingyu-gateway:
        condition: service_healthy
    environment:
      GLOBAL_ROUTER_ROUTES_JSON: "${GLOBAL_ROUTER_ROUTES_JSON:-}"
      RUST_LOG: "${GLOBAL_ROUTER_RUST_LOG:-info}"
    expose:
      - "8099"
    networks:
      hermes-internal:
        ipv4_address: "${GLOBAL_ROUTER_IP:-172.20.0.15}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8099/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  tonglingyu-gateway:
    <<: *tonglingyu-gateway-image
    container_name: tonglingyu-gateway
    command:
      [
        "tonglingyu-gateway",
        "serve",
        "--bind",
        "0.0.0.0:8090",
      ]
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      TONGLINGYU_DB_PATH: "${TONGLINGYU_DB_PATH:-/data/tonglingyu.db}"
      TONGLINGYU_SOURCE_ROOT: "${TONGLINGYU_CONTAINER_SOURCE_ROOT:-/app/resources/sources/wiki}"
      TONGLINGYU_AUTO_BUILD_KB: "${TONGLINGYU_AUTO_BUILD_KB:-true}"
      TONGLINGYU_MODEL_ID: "${TONGLINGYU_MODEL_ID:-tonglingyu}"
      TONGLINGYU_MODEL_NAME: "${TONGLINGYU_MODEL_NAME:-通灵玉}"
      TONGLINGYU_UPSTREAM_BASE_URL: "${TONGLINGYU_UPSTREAM_BASE_URL:-http://hermes:8642/v1}"
      TONGLINGYU_UPSTREAM_API_KEY: "${HERMES_API_KEY:?set HERMES_API_KEY in .env}"
      TONGLINGYU_UPSTREAM_MODEL: "${TONGLINGYU_UPSTREAM_MODEL:-hermes-agent}"
      TONGLINGYU_MAX_EVIDENCE: "${TONGLINGYU_MAX_EVIDENCE:-8}"
      RUST_LOG: "${AGENT_PLATFORM_RUST_LOG:-info}"
    volumes:
      - "${TONGLINGYU_SOURCE_ROOT:-../resources/sources/wiki}:/app/resources/sources/wiki:ro"
      - "${TONGLINGYU_DATA_DIR:-./data/tonglingyu}:/data"
    expose:
      - "8090"
    networks:
      hermes-internal:
        ipv4_address: "${TONGLINGYU_GATEWAY_IP:-172.20.0.14}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_IMAGE_TAG:-latest}
    container_name: hermes-cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate --protocol ${CLOUDFLARED_PROTOCOL:-auto} run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TOKEN:?set CLOUDFLARED_TOKEN in .env}"
    extra_hosts:
      - "open-webui:${OPEN_WEBUI_ORIGIN_IP:-172.20.0.3}"
    depends_on:
      open-webui:
        condition: service_started

  agent-platform-postgres:
    image: postgres:${AGENT_PLATFORM_POSTGRES_IMAGE_TAG:-18-alpine}
    container_name: agent-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${AGENT_PLATFORM_POSTGRES_USER:-agent_platform}"
      POSTGRES_PASSWORD: "${AGENT_PLATFORM_POSTGRES_PASSWORD:?set AGENT_PLATFORM_POSTGRES_PASSWORD in .env}"
      POSTGRES_DB: "${AGENT_PLATFORM_POSTGRES_DB:-agent_platform}"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - "${AGENT_PLATFORM_POSTGRES_DATA_DIR:?set AGENT_PLATFORM_POSTGRES_DATA_DIR in .env}:/var/lib/postgresql/data"
    expose:
      - "5432"
    networks:
      hermes-internal:
        ipv4_address: "${AGENT_PLATFORM_POSTGRES_IP:-172.20.0.4}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  agent-manager:
    <<: *agent-platform-image
    container_name: agent-manager
    command: ["agent-manager", "--bind", "0.0.0.0:8088"]
    depends_on:
      agent-platform-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${AGENT_PLATFORM_DATABASE_URL:?set AGENT_PLATFORM_DATABASE_URL in .env}"
      AGENT_ALLOW_DEV_HEADERS: "${AGENT_PLATFORM_ALLOW_DEV_HEADERS:-true}"
      AGENT_JWT_SECRET: "${AGENT_JWT_SECRET:-}"
      RUST_LOG: "${AGENT_PLATFORM_RUST_LOG:-info}"
    expose:
      - "8088"
    networks:
      hermes-internal:
        ipv4_address: "${AGENT_MANAGER_IP:-172.20.0.10}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  agent-orchestrator:
    <<: *agent-platform-image
    container_name: agent-orchestrator
    command: ["agent-orchestrator", "--bind", "0.0.0.0:8080"]
    depends_on:
      hermes:
        condition: service_healthy
      agent-manager:
        condition: service_healthy
    environment:
      AGENT_MANAGER_URL: "http://agent-manager:8088"
      AGENT_ORCHESTRATOR_UPSTREAM_BASE_URL: "http://hermes:8642/v1"
      AGENT_ORCHESTRATOR_UPSTREAM_API_KEY: "${HERMES_API_KEY:?set HERMES_API_KEY in .env}"
      AGENT_BRIDGE_SECRET: "${AGENT_BRIDGE_SECRET:-}"
      AGENT_BRIDGE_ISSUER: "${AGENT_BRIDGE_ISSUER:-open-webui}"
      AGENT_BRIDGE_MAX_CLOCK_SKEW_SECONDS: "${AGENT_BRIDGE_MAX_CLOCK_SKEW_SECONDS:-300}"
      AGENT_BRIDGE_RESOURCE_ALLOWLIST: "${AGENT_BRIDGE_RESOURCE_ALLOWLIST:-resource:team/default}"
      AGENT_BRIDGE_USER_ROLE: "${AGENT_BRIDGE_USER_ROLE:-viewer}"
      AGENT_BRIDGE_ADMIN_ROLE_MAPPING: "${AGENT_BRIDGE_ADMIN_ROLE_MAPPING:-disabled}"
      AGENT_BRIDGE_RUN_WAIT_TIMEOUT_SECONDS: "${AGENT_BRIDGE_RUN_WAIT_TIMEOUT_SECONDS:-20}"
      AGENT_BRIDGE_RUN_POLL_INTERVAL_MS: "${AGENT_BRIDGE_RUN_POLL_INTERVAL_MS:-500}"
      AGENT_JWT_SECRET: "${AGENT_JWT_SECRET:-}"
      AGENT_MANAGER_SERVICE_ID: "${AGENT_MANAGER_SERVICE_ID:-agent-orchestrator}"
      AGENT_MANAGER_JWT_TTL_SECONDS: "${AGENT_MANAGER_JWT_TTL_SECONDS:-300}"
      RUST_LOG: "${AGENT_PLATFORM_RUST_LOG:-info}"
    expose:
      - "8080"
    networks:
      hermes-internal:
        ipv4_address: "${AGENT_ORCHESTRATOR_IP:-172.20.0.11}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  agent-worker:
    <<: *agent-platform-image
    container_name: agent-worker
    command:
      [
        "agent-worker",
        "worker",
        "--worker-id",
        "${AGENT_WORKER_ID:-worker-primary}",
        "--interval-ms",
        "${AGENT_WORKER_INTERVAL_MS:-1000}",
      ]
    depends_on:
      agent-platform-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${AGENT_PLATFORM_DATABASE_URL:?set AGENT_PLATFORM_DATABASE_URL in .env}"
      RUST_LOG: "${AGENT_PLATFORM_RUST_LOG:-info}"
    networks:
      hermes-internal:
        ipv4_address: "${AGENT_WORKER_IP:-172.20.0.12}"

  agent-observer:
    <<: *agent-platform-image
    container_name: agent-observer
    command:
      [
        "agent-worker",
        "observer",
        "--interval-ms",
        "${AGENT_OBSERVER_INTERVAL_MS:-30000}",
      ]
    depends_on:
      agent-platform-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${AGENT_PLATFORM_DATABASE_URL:?set AGENT_PLATFORM_DATABASE_URL in .env}"
      RUST_LOG: "${AGENT_PLATFORM_RUST_LOG:-info}"
    networks:
      hermes-internal:
        ipv4_address: "${AGENT_OBSERVER_IP:-172.20.0.13}"

networks:
  hermes-internal:
    name: hermes-internal
    driver: bridge
    ipam:
      config:
        - subnet: "${HERMES_INTERNAL_SUBNET:-172.20.0.0/16}"
  local-openai-network:
    external: true
    name: "${LOCAL_OPENAI_DOCKER_NETWORK:-sub2api_sub2api-network}"
