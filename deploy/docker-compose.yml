name: tonglingyu-home

x-tonglingyu-gateway-image: &tonglingyu-gateway-image
  image: "${TONGLINGYU_GATEWAY_IMAGE_REF:-tonglingyu-gateway:${TONGLINGYU_VERSION:-latest}}"
  build:
    context: "${TONGLINGYU_GATEWAY_BUILD_CONTEXT:-../agent-platform}"
    dockerfile: crates/tonglingyu-gateway/Dockerfile
    args:
      APP_VERSION: "${TONGLINGYU_VERSION:-latest}"
  labels:
    org.opencontainers.image.version: "${TONGLINGYU_VERSION:-latest}"
  restart: unless-stopped

services:
  open-webui:
    image: "${OPEN_WEBUI_IMAGE_REF:-ghcr.io/open-webui/open-webui:main}"
    container_name: home-open-webui
    restart: unless-stopped
    depends_on:
      tonglingyu-gateway:
        condition: service_healthy
    environment:
      WEBUI_NAME: "${OPEN_WEBUI_NAME:-Tonglingyu Home}"
      WEBUI_URL: "${PUBLIC_WEBUI_URL:?set PUBLIC_WEBUI_URL in .env}"
      WEBUI_SECRET_KEY: "${OPEN_WEBUI_SECRET_KEY:?set OPEN_WEBUI_SECRET_KEY in .env}"
      WEBUI_AUTH: "${OPEN_WEBUI_AUTH:-true}"
      ENABLE_LOGIN_FORM: "${OPEN_WEBUI_ENABLE_LOGIN_FORM:-true}"
      ENABLE_PASSWORD_AUTH: "${OPEN_WEBUI_ENABLE_PASSWORD_AUTH:-true}"
      ENABLE_SIGNUP: "${OPEN_WEBUI_ENABLE_SIGNUP:-true}"
      ENABLE_SIGNUP_PASSWORD_CONFIRMATION: "${OPEN_WEBUI_ENABLE_SIGNUP_PASSWORD_CONFIRMATION:-true}"
      DEFAULT_USER_ROLE: "${OPEN_WEBUI_DEFAULT_USER_ROLE:-pending}"
      DEFAULT_LOCALE: "${OPEN_WEBUI_DEFAULT_LOCALE:-zh-CN}"
      DEFAULT_MODELS: "${OPEN_WEBUI_DEFAULT_MODELS:-tonglingyu}"
      OFFLINE_MODE: "${OPEN_WEBUI_OFFLINE_MODE:-true}"
      HF_HUB_OFFLINE: "${OPEN_WEBUI_HF_HUB_OFFLINE:-1}"
      RAG_EMBEDDING_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_RAG_EMBEDDING_MODEL_AUTO_UPDATE:-false}"
      RAG_RERANKING_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_RAG_RERANKING_MODEL_AUTO_UPDATE:-false}"
      WHISPER_MODEL_AUTO_UPDATE: "${OPEN_WEBUI_WHISPER_MODEL_AUTO_UPDATE:-false}"
      OPENAI_API_BASE_URLS: "${OPEN_WEBUI_OPENAI_API_BASE_URLS:-http://tonglingyu-gateway:8090/v1}"
      OPENAI_API_KEY: "${TONGLINGYU_GATEWAY_API_KEY:?set TONGLINGYU_GATEWAY_API_KEY in .env}"
      OPENAI_API_KEYS: "${OPEN_WEBUI_OPENAI_API_KEYS:-${TONGLINGYU_GATEWAY_API_KEY}}"
      ENABLE_OLLAMA_API: "${OPEN_WEBUI_ENABLE_OLLAMA_API:-false}"
    volumes:
      - "${OPEN_WEBUI_DATA_DIR:?set OPEN_WEBUI_DATA_DIR in .env}:/app/backend/data"
    expose:
      - "8080"
    networks:
      tonglingyu-internal:
        ipv4_address: "${OPEN_WEBUI_ORIGIN_IP:-172.20.0.3}"

  tonglingyu-gateway:
    <<: *tonglingyu-gateway-image
    container_name: tonglingyu-gateway
    command:
      [
        "tonglingyu-gateway",
        "serve",
        "--bind",
        "0.0.0.0:8090",
      ]
    environment:
      TONGLINGYU_DB_PATH: "${TONGLINGYU_DB_PATH:-/data/tonglingyu.db}"
      TONGLINGYU_QUERY_EXPANSIONS_PATH: "${TONGLINGYU_QUERY_EXPANSIONS_PATH:-}"
      TONGLINGYU_EVIDENCE_SLOT_RULES_PATH: "${TONGLINGYU_EVIDENCE_SLOT_RULES_PATH:-}"
      TONGLINGYU_GOVERNANCE_RULES_PATH: "${TONGLINGYU_GOVERNANCE_RULES_PATH:-}"
      TONGLINGYU_RETRIEVAL_RULES_PATH: "${TONGLINGYU_RETRIEVAL_RULES_PATH:-}"
      TONGLINGYU_ONTOLOGY_ALIASES_PATH: "${TONGLINGYU_ONTOLOGY_ALIASES_PATH:-}"
      TONGLINGYU_SOURCE_ROOT: "${TONGLINGYU_CONTAINER_SOURCE_ROOT:-/app/resources/sources/wiki}"
      TONGLINGYU_AUTO_BUILD_KB: "${TONGLINGYU_AUTO_BUILD_KB:-true}"
      TONGLINGYU_MODEL_ID: "${TONGLINGYU_MODEL_ID:-tonglingyu}"
      TONGLINGYU_MODEL_NAME: "${TONGLINGYU_MODEL_NAME:-通灵玉}"
      TONGLINGYU_UPSTREAM_BASE_URL: "${TONGLINGYU_UPSTREAM_BASE_URL:-${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BASE_URL:-http://sub2api:8080/v1}}"
      TONGLINGYU_UPSTREAM_API_KEY: "${TONGLINGYU_UPSTREAM_API_KEY:-${OPENAI_COMPATIBLE_API_KEY:-}}"
      TONGLINGYU_UPSTREAM_MODEL: "${TONGLINGYU_UPSTREAM_MODEL:-${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_MODEL:-gpt-5.4-mini}}"
      MINIMAX_API_KEY: "${MINIMAX_API_KEY:?set MINIMAX_API_KEY in .env}"
      OPENAI_COMPATIBLE_API_KEY: "${OPENAI_COMPATIBLE_API_KEY:?set OPENAI_COMPATIBLE_API_KEY in .env}"
      TONGLINGYU_AGENT_ROLE_TEXT_PROVIDER: "${TONGLINGYU_AGENT_ROLE_TEXT_PROVIDER:?set TONGLINGYU_AGENT_ROLE_TEXT_PROVIDER in .env}"
      TONGLINGYU_AGENT_ROLE_PACKAGE_PROVIDER: "${TONGLINGYU_AGENT_ROLE_PACKAGE_PROVIDER:?set TONGLINGYU_AGENT_ROLE_PACKAGE_PROVIDER in .env}"
      TONGLINGYU_AGENT_ROLE_DRAFT_PROVIDER: "${TONGLINGYU_AGENT_ROLE_DRAFT_PROVIDER:?set TONGLINGYU_AGENT_ROLE_DRAFT_PROVIDER in .env}"
      TONGLINGYU_AGENT_ROLE_REVIEW_PROVIDER: "${TONGLINGYU_AGENT_ROLE_REVIEW_PROVIDER:?set TONGLINGYU_AGENT_ROLE_REVIEW_PROVIDER in .env}"
      TONGLINGYU_AGENT_ROLE_QUESTION_NORMALIZER_PROVIDER: "${TONGLINGYU_AGENT_ROLE_QUESTION_NORMALIZER_PROVIDER:?set TONGLINGYU_AGENT_ROLE_QUESTION_NORMALIZER_PROVIDER in .env}"
      TONGLINGYU_AGENT_ROLE_CONVERSATION_STATE_PROVIDER: "${TONGLINGYU_AGENT_ROLE_CONVERSATION_STATE_PROVIDER:?set TONGLINGYU_AGENT_ROLE_CONVERSATION_STATE_PROVIDER in .env}"
      TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BACKEND: "${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BACKEND:?set TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BACKEND in .env}"
      TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BASE_URL: "${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BASE_URL:?set TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_BASE_URL in .env}"
      TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_MODEL: "${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_MODEL:?set TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_MODEL in .env}"
      TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_API_KEY_ENV: "${TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_API_KEY_ENV:?set TONGLINGYU_AGENT_PROVIDER_OPENAI_PROFILE_API_KEY_ENV in .env}"
      TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BACKEND: "${TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BACKEND:?set TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BACKEND in .env}"
      TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BASE_URL: "${TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BASE_URL:?set TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_BASE_URL in .env}"
      TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_MODEL: "${TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_MODEL:?set TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_MODEL in .env}"
      TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_API_KEY_ENV: "${TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_API_KEY_ENV:?set TONGLINGYU_AGENT_PROVIDER_MINIMAX_CONTEXT_API_KEY_ENV in .env}"
      AGENT_RUNTIME_TIMEOUT_SECONDS: "${AGENT_RUNTIME_TIMEOUT_SECONDS:-30}"
      TONGLINGYU_AGENT_RUNTIME_PROFILE_MAX_SECONDS: "${TONGLINGYU_AGENT_RUNTIME_PROFILE_MAX_SECONDS:-90}"
      TONGLINGYU_MAX_EVIDENCE: "${TONGLINGYU_MAX_EVIDENCE:-8}"
      TONGLINGYU_GATEWAY_API_KEY: "${TONGLINGYU_GATEWAY_API_KEY:?set TONGLINGYU_GATEWAY_API_KEY in .env}"
      TONGLINGYU_GATEWAY_API_KEYS: "${TONGLINGYU_GATEWAY_API_KEYS:-}"
      TONGLINGYU_ADMIN_API_KEY: "${TONGLINGYU_ADMIN_API_KEY:?set TONGLINGYU_ADMIN_API_KEY in .env}"
      TONGLINGYU_ADMIN_API_KEYS: "${TONGLINGYU_ADMIN_API_KEYS:-}"
      TONGLINGYU_ALLOW_ADMIN_WITH_GATEWAY_KEY: "${TONGLINGYU_ALLOW_ADMIN_WITH_GATEWAY_KEY:-false}"
      TONGLINGYU_UPSTREAM_TIMEOUT_SECS: "${TONGLINGYU_UPSTREAM_TIMEOUT_SECS:-30}"
      TONGLINGYU_MAX_MESSAGES: "${TONGLINGYU_MAX_MESSAGES:-40}"
      TONGLINGYU_MAX_QUESTION_CHARS: "${TONGLINGYU_MAX_QUESTION_CHARS:-4000}"
      TONGLINGYU_RETENTION_DAYS: "${TONGLINGYU_RETENTION_DAYS:-90}"
      TONGLINGYU_PROFILE_MAIN: "${TONGLINGYU_PROFILE_MAIN:-honglou-main}"
      TONGLINGYU_PROFILE_TEXT: "${TONGLINGYU_PROFILE_TEXT:-honglou-text}"
      TONGLINGYU_PROFILE_COMMENTARY: "${TONGLINGYU_PROFILE_COMMENTARY:-honglou-commentary}"
      TONGLINGYU_PROFILE_REVIEWER: "${TONGLINGYU_PROFILE_REVIEWER:-honglou-reviewer}"
      RUST_LOG: "${TONGLINGYU_RUST_LOG:-info}"
    volumes:
      - "${TONGLINGYU_SOURCE_ROOT:-../resources/sources/wiki}:/app/resources/sources/wiki:ro"
      - "${TONGLINGYU_DATA_DIR:?set TONGLINGYU_DATA_DIR in .env}:/data"
    expose:
      - "8090"
    networks:
      tonglingyu-internal:
        ipv4_address: "${TONGLINGYU_GATEWAY_IP:-172.20.0.14}"
    healthcheck:
      test:
        [
          "CMD",
          "tonglingyu-gateway",
          "healthcheck",
          "--url",
          "http://127.0.0.1:8090/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cloudflared:
    image: "${CLOUDFLARED_IMAGE_REF:-cloudflare/cloudflared:latest}"
    container_name: home-cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate --protocol ${CLOUDFLARED_PROTOCOL:-auto} run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARED_TOKEN:?set CLOUDFLARED_TOKEN in .env}"
    extra_hosts:
      - "open-webui:${OPEN_WEBUI_ORIGIN_IP:-172.20.0.3}"
    depends_on:
      open-webui:
        condition: service_started

networks:
  tonglingyu-internal:
    name: tonglingyu-internal
    driver: bridge
    ipam:
      config:
        - subnet: "${TONGLINGYU_INTERNAL_SUBNET:-172.20.0.0/16}"
